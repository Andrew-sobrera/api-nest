services:
  postgres:
    image: postgres:16-alpine
    container_name: orders-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d orders_db']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orders-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orders_db?schema=public
      JWT_SECRET: super-secret-jwt-key-for-docker-environment
      JWT_EXPIRES_IN: 1d
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      BCRYPT_SALT_ROUNDS: 10
      SEED_ADMIN_EMAIL: admin@orders.local
      SEED_ADMIN_PASSWORD: Admin@123456
      SEED_ADMIN_NAME: System Administrator
      CORS_ORIGIN: '*'
    ports:
      - '3000:3000'

volumes:
  postgres_data:
